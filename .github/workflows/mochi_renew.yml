name: Auto Renew Mochi
on:
  schedule:
    - cron: '0 1 * * *' # 每天 UTC 1点（北京时间 9点），根据服务到期时间自行调整
  workflow_dispatch:
permissions:
  actions: write
  contents: read
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 拉取私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Mochi-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 复制脚本到工作目录
        run: cp private/mochi_renew.py mochi_renew.py

      - name: 🐍 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk wget python3-tk python3-dev
          pip install seleniumbase requests --quiet
          seleniumbase install chromedriver

      - name: ⚙️ 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 🚀 运行续期脚本
        env:
          MOCHI_ACCOUNT: ${{ secrets.MOCHI_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum python3 mochi_renew.py

      - name: 🧽 清理进程和临时文件
        if: always()
        run: |
          pkill -f sing-box || true
          pkill -f chromedriver || true
          pkill -f chrome || true
          pkill -f Xvfb || true
          pkill -f python || true
          rm -f sing-box sing-box-config.json sing-box.log mochi_renew.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --repo ${{ github.repository }} --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id --repo ${{ github.repository }} || true
            fi
          done
